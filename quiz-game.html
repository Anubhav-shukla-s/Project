<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Country Quiz - PopScope</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-orb orb-one"></div>
  <div class="bg-orb orb-two"></div>

  <main class="shell">
    <nav class="topbar">
      <div class="brand">
        <span class="brand-dot"></span>
        <span>PopScope</span>
      </div>
      <button class="ghost-btn" id="back-modes-btn">Back To Modes</button>
    </nav>

    <section class="game-section" id="game-section">
      <div class="section-head">
        <h2 id="quiz-title">World Quiz</h2>
        <p id="game-score">0 / 0 found</p>
      </div>
      <p class="status-text" id="game-status">Loading world map and countries...</p>

      <div class="game-controls">
        <input
          type="search"
          id="game-country-input"
          placeholder="Type country name (example: India)"
          autocomplete="off"
        />
        <button class="primary-btn" id="guess-country-btn">Find Country</button>
        <button class="ghost-btn" id="reset-game-btn">Reset Colors</button>
      </div>

      <div class="map-wrap">
        <svg id="world-map-svg" role="img" aria-label="World map for country finding game"></svg>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
  <script src="quiz-game.js"></script>
</body>
</html>
